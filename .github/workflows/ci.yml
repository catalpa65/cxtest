name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Start prod stack
        env:
          APP_NOTIFY_PROVIDER: mock
        run: docker compose up --build -d

      - name: Smoke
        run: ./scripts/smoke.sh

      - name: MQ smoke
        run: ./scripts/mq-smoke.sh

      - name: Prod acceptance
        run: ./scripts/prod-acceptance.sh http://127.0.0.1:8080 200 10 100 10

      - name: Docker compose ps
        if: always()
        run: docker compose ps

      - name: App logs
        if: failure()
        run: docker compose logs --no-color app

      - name: Stop stack
        if: always()
        run: docker compose down -v
